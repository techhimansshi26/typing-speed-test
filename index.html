<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TypeRush — Typing Speed Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <header>
    <div class="logo">Type<span>Rush</span></div>
    <div class="mode-tabs">
      <button class="mode-tab active" data-time="30">30s</button>
      <button class="mode-tab" data-time="60">60s</button>
      <button class="mode-tab" data-time="120">120s</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat-card highlight">
      <span class="stat-label">WPM</span>
      <span class="stat-value" id="stat-wpm">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Accuracy</span>
      <span class="stat-value" id="stat-acc">—<span class="stat-unit">%</span></span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Errors</span>
      <span class="stat-value" id="stat-err">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Time</span>
      <div class="timer-ring-wrap">
        <svg viewBox="0 0 48 48" width="48" height="48">
          <circle class="ring-bg" cx="24" cy="24" r="22"/>
          <circle class="ring-fg" id="ring-fg" cx="24" cy="24" r="22"/>
        </svg>
        <div class="timer-text" id="stat-time">30</div>
      </div>
    </div>
  </div>

  <div class="typing-container" id="typing-box">
    <div class="progress-line"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div id="passage"></div>
    <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    <div class="input-hint">Click here or press <span>any key</span> to start typing</div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="btn-restart">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
      Restart
    </button>
    <button class="btn btn-ghost" id="btn-new">New Text</button>
  </div>
</div>

<div id="result-overlay">
  <div class="result-card">
    <div class="result-title">Test Complete</div>
    <div class="result-wpm" id="res-wpm">0</div>
    <div class="result-wpm-label">Words per Minute</div>

    <div class="perf-bar-wrap">
      <div class="perf-label"><span>Accuracy</span><span id="res-acc-pct">0%</span></div>
      <div class="perf-bar"><div class="perf-bar-fill" id="res-acc-bar" style="width:0%"></div></div>
    </div>

    <div class="result-grid">
      <div class="result-stat">
        <div class="result-stat-val" id="res-correct">0</div>
        <div class="result-stat-lbl">Correct</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-val" id="res-errors">0</div>
        <div class="result-stat-lbl">Errors</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-val" id="res-chars">0</div>
        <div class="result-stat-lbl">Characters</div>
      </div>
    </div>

    <button class="btn btn-primary" id="res-restart">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
      Try Again
    </button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
