<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TypeRush — Typing Speed Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --correct: #10b981;
      --incorrect: #ef4444;
      --pending: #4a4a60;
      --text: #e2e2f0;
      --muted: #6b6b88;
      --glow: rgba(124, 58, 237, 0.4);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -30%;
      left: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(124,58,237,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 860px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 48px;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span { color: var(--accent2); -webkit-text-fill-color: var(--accent2); }

    .mode-tabs {
      display: flex;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 5px;
    }

    .mode-tab {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .mode-tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 16px var(--glow);
    }

    /* ── Stats bar ── */
    .stats-bar {
      width: 100%;
      max-width: 860px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 0.3s;
    }

    .stat-card:hover { border-color: var(--accent); }

    .stat-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 1.9rem;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
      transition: color 0.3s;
    }

    .stat-unit {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 400;
    }

    .stat-card.highlight .stat-value { color: var(--accent2); }

    /* ── Timer ring ── */
    .timer-ring-wrap {
      position: relative;
      width: 56px;
      height: 56px;
    }

    .timer-ring-wrap svg { transform: rotate(-90deg); }

    .ring-bg { fill: none; stroke: var(--border); stroke-width: 3; }
    .ring-fg {
      fill: none;
      stroke: var(--accent);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 138;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.3s;
    }

    .timer-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    /* ── Typing area ── */
    .typing-container {
      width: 100%;
      max-width: 860px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 36px;
      position: relative;
      transition: border-color 0.3s;
    }

    .typing-container.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 40px rgba(124,58,237,0.15); }

    /* Passage */
    #passage {
      font-family: 'Space Mono', monospace;
      font-size: 1.22rem;
      line-height: 2;
      letter-spacing: 0.3px;
      color: var(--pending);
      user-select: none;
      word-break: break-word;
      margin-bottom: 28px;
      min-height: 100px;
      position: relative;
    }

    #passage .char { position: relative; transition: color 0.08s; }
    #passage .char.correct { color: var(--correct); }
    #passage .char.incorrect { color: var(--incorrect); text-decoration: underline; text-decoration-color: var(--incorrect); }
    #passage .char.cursor::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 2px;
      background: var(--accent2);
      animation: blink 0.8s step-end infinite;
      border-radius: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Input */
    #hidden-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    .input-hint {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.5px;
    }

    .input-hint span {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 7px;
      font-size: 0.7rem;
    }

    /* ── Controls ── */
    .controls {
      width: 100%;
      max-width: 860px;
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
    }

    .btn {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      letter-spacing: 0.5px;
      padding: 12px 28px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px var(--glow);
    }

    .btn-primary:hover { background: #6d28d9; transform: translateY(-1px); box-shadow: 0 6px 24px var(--glow); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    /* ── Result overlay ── */
    #result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #result-overlay.show { display: flex; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 24px;
      padding: 48px 52px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 80px rgba(124,58,237,0.3);
      animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .result-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .result-wpm {
      font-family: 'Space Mono', monospace;
      font-size: 5.5rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .result-wpm-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .result-stat {
      background: var(--surface2);
      border-radius: 12px;
      padding: 16px 10px;
    }

    .result-stat-val {
      font-family: 'Space Mono', monospace;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }

    .result-stat-lbl {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .result-card .btn { width: 100%; justify-content: center; }

    /* Performance bar */
    .perf-bar-wrap { margin-bottom: 32px; }
    .perf-label {
      display: flex;
      justify-content: space-between;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .perf-bar {
      height: 8px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .perf-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    }

    /* Progress line */
    .progress-line {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.15s;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .typing-container { padding: 20px 18px; }
      #passage { font-size: 1rem; }
      .result-card { padding: 32px 24px; }
      .result-wpm { font-size: 4rem; }
    }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">Type<span>Rush</span></div>
    <div class="mode-tabs">
      <button class="mode-tab active" data-time="30">30s</button>
      <button class="mode-tab" data-time="60">60s</button>
      <button class="mode-tab" data-time="120">120s</button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card highlight">
      <span class="stat-label">WPM</span>
      <span class="stat-value" id="stat-wpm">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Accuracy</span>
      <span class="stat-value" id="stat-acc">—<span class="stat-unit">%</span></span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Errors</span>
      <span class="stat-value" id="stat-err">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Time</span>
      <div class="timer-ring-wrap">
        <svg viewBox="0 0 48 48" width="48" height="48">
          <circle class="ring-bg" cx="24" cy="24" r="22"/>
          <circle class="ring-fg" id="ring-fg" cx="24" cy="24" r="22"/>
        </svg>
        <div class="timer-text" id="stat-time">30</div>
      </div>
    </div>
  </div>

  <!-- Typing area -->
  <div class="typing-container" id="typing-box">
    <div class="progress-line"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div id="passage"></div>
    <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    <div class="input-hint">Click here or press <span>any key</span> to start typing</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-primary" id="btn-restart">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
      Restart
    </button>
    <button class="btn btn-ghost" id="btn-new">New Text</button>
  </div>
</div>

<!-- Result overlay -->
<div id="result-overlay">
  <div class="result-card">
    <div class="result-title">Test Complete</div>
    <div class="result-wpm" id="res-wpm">0</div>
    <div class="result-wpm-label">Words per Minute</div>

    <div class="perf-bar-wrap">
      <div class="perf-label"><span>Accuracy</span><span id="res-acc-pct">0%</span></div>
      <div class="perf-bar"><div class="perf-bar-fill" id="res-acc-bar" style="width:0%"></div></div>
    </div>

    <div class="result-grid">
      <div class="result-stat">
        <div class="result-stat-val" id="res-correct">0</div>
        <div class="result-stat-lbl">Correct</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-val" id="res-errors">0</div>
        <div class="result-stat-lbl">Errors</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-val" id="res-chars">0</div>
        <div class="result-stat-lbl">Characters</div>
      </div>
    </div>

    <button class="btn btn-primary" id="res-restart">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
      Try Again
    </button>
  </div>
</div>

<script>
  // ─── Word bank ───────────────────────────────────────────────
  const WORDS = [
    "the","quick","brown","fox","jumps","over","lazy","dog","a","is","in",
    "to","and","of","it","that","was","he","for","on","are","as","with",
    "his","they","at","be","this","from","or","had","by","hot","word",
    "but","what","some","we","can","out","other","were","all","there",
    "when","up","use","your","how","said","an","each","which","she","do",
    "their","time","if","will","way","about","many","then","them","write",
    "would","like","so","these","her","long","make","thing","see","him",
    "two","has","look","more","day","could","go","come","did","number",
    "sound","no","most","people","my","over","know","water","than","call",
    "first","who","may","down","side","been","now","find","any","new","work",
    "part","take","get","place","made","live","where","after","back","little",
    "only","round","man","year","came","show","every","good","me","give",
    "our","under","name","very","through","just","form","sentence","great",
    "think","say","help","low","line","differ","turn","cause","much","mean",
    "before","move","right","boy","old","too","same","tell","following",
    "want","show","also","around","form","three","small","set","put","end",
    "does","another","well","large","need","big","high","such","next","open"
  ];

  function generatePassage(wordCount = 60) {
    let words = [];
    for (let i = 0; i < wordCount; i++) {
      words.push(WORDS[Math.floor(Math.random() * WORDS.length)]);
    }
    return words.join(' ');
  }

  // ─── State ────────────────────────────────────────────────────
  let passage = '';
  let userInput = '';
  let startTime = null;
  let timerInterval = null;
  let testDuration = 30;
  let timeLeft = 30;
  let testActive = false;
  let testFinished = false;
  let correctChars = 0;
  let errorCount = 0;

  // ─── DOM refs ─────────────────────────────────────────────────
  const passageEl    = document.getElementById('passage');
  const hiddenInput  = document.getElementById('hidden-input');
  const typingBox    = document.getElementById('typing-box');
  const statWpm      = document.getElementById('stat-wpm');
  const statAcc      = document.getElementById('stat-acc');
  const statErr      = document.getElementById('stat-err');
  const statTime     = document.getElementById('stat-time');
  const ringFg       = document.getElementById('ring-fg');
  const progressFill = document.getElementById('progress-fill');
  const overlay      = document.getElementById('result-overlay');
  const RING_CIRC    = 2 * Math.PI * 22; // ≈ 138.23

  // ─── Render passage ───────────────────────────────────────────
  function renderPassage() {
    passageEl.innerHTML = '';
    for (let i = 0; i < passage.length; i++) {
      const span = document.createElement('span');
      span.classList.add('char');
      span.textContent = passage[i] === ' ' ? '\u00A0' : passage[i];
      span.dataset.index = i;
      passageEl.appendChild(span);
    }
    updateCursor(0);
  }

  function updateCursor(pos) {
    document.querySelectorAll('.char.cursor').forEach(el => el.classList.remove('cursor'));
    const chars = passageEl.querySelectorAll('.char');
    if (pos < chars.length) chars[pos].classList.add('cursor');
  }

  // ─── Input handling ───────────────────────────────────────────
  hiddenInput.addEventListener('input', onInput);
  hiddenInput.addEventListener('keydown', onKeyDown);

  function onKeyDown(e) {
    if (e.key === 'Backspace') {
      e.preventDefault();
      if (userInput.length === 0) return;
      userInput = userInput.slice(0, -1);
      refreshChars();
    }
  }

  function onInput(e) {
    if (testFinished) return;

    const val = hiddenInput.value;
    hiddenInput.value = ''; // always clear — we manage state

    if (!testActive && val.trim() !== '') startTest();
    if (!testActive) return;

    for (const ch of val) {
      if (userInput.length < passage.length) {
        userInput += ch;
      }
    }

    refreshChars();

    // Auto-finish if all typed
    if (userInput.length >= passage.length) {
      finishTest();
    }
  }

  function refreshChars() {
    const chars = passageEl.querySelectorAll('.char');
    correctChars = 0;
    errorCount = 0;

    for (let i = 0; i < chars.length; i++) {
      chars[i].classList.remove('correct', 'incorrect', 'cursor');
      if (i < userInput.length) {
        if (userInput[i] === passage[i]) {
          chars[i].classList.add('correct');
          correctChars++;
        } else {
          chars[i].classList.add('incorrect');
          errorCount++;
        }
      }
    }
    updateCursor(userInput.length);

    // Progress
    const pct = (userInput.length / passage.length) * 100;
    progressFill.style.width = pct + '%';

    // Live stats
    statErr.textContent = errorCount;
    const total = userInput.length;
    const acc = total > 0 ? Math.round((correctChars / total) * 100) : 0;
    statAcc.innerHTML = acc + '<span class="stat-unit">%</span>';

    // Live WPM
    if (startTime) {
      const elapsed = (Date.now() - startTime) / 60000;
      const wpm = elapsed > 0 ? Math.round((correctChars / 5) / elapsed) : 0;
      statWpm.textContent = wpm;
    }
  }

  // ─── Timer ────────────────────────────────────────────────────
  function startTest() {
    testActive = true;
    startTime = Date.now();
    typingBox.classList.add('active');
    timerInterval = setInterval(tick, 1000);
  }

  function tick() {
    timeLeft--;
    statTime.textContent = timeLeft;

    // Ring
    const pct = timeLeft / testDuration;
    ringFg.style.strokeDashoffset = RING_CIRC * (1 - pct);
    if (pct < 0.33) ringFg.style.stroke = 'var(--incorrect)';
    else if (pct < 0.6) ringFg.style.stroke = 'var(--accent2)';
    else ringFg.style.stroke = 'var(--accent)';

    if (timeLeft <= 0) finishTest();
  }

  // ─── Finish ───────────────────────────────────────────────────
  function finishTest() {
    if (testFinished) return;
    testFinished = true;
    clearInterval(timerInterval);
    testActive = false;
    hiddenInput.blur();

    const elapsed = startTime ? (Date.now() - startTime) / 60000 : (testDuration / 60);
    const wpm = elapsed > 0 ? Math.round((correctChars / 5) / elapsed) : 0;
    const total = userInput.length;
    const acc = total > 0 ? Math.round((correctChars / total) * 100) : 0;

    // Show overlay
    document.getElementById('res-wpm').textContent = wpm;
    document.getElementById('res-acc-pct').textContent = acc + '%';
    document.getElementById('res-acc-bar').style.width = acc + '%';
    document.getElementById('res-correct').textContent = correctChars;
    document.getElementById('res-errors').textContent = errorCount;
    document.getElementById('res-chars').textContent = total;

    overlay.classList.add('show');
  }

  // ─── Restart / New ────────────────────────────────────────────
  function resetTest(newText = false) {
    clearInterval(timerInterval);
    testActive = false;
    testFinished = false;
    userInput = '';
    correctChars = 0;
    errorCount = 0;
    startTime = null;
    timeLeft = testDuration;
    typingBox.classList.remove('active');

    statWpm.textContent = '0';
    statAcc.innerHTML = '—';
    statErr.textContent = '0';
    statTime.textContent = testDuration;
    progressFill.style.width = '0%';
    ringFg.style.strokeDashoffset = 0;
    ringFg.style.stroke = 'var(--accent)';

    if (newText) passage = generatePassage(70);
    renderPassage();
    overlay.classList.remove('show');
    hiddenInput.value = '';
    hiddenInput.focus();
  }

  document.getElementById('btn-restart').addEventListener('click', () => resetTest(false));
  document.getElementById('btn-new').addEventListener('click', () => resetTest(true));
  document.getElementById('res-restart').addEventListener('click', () => resetTest(true));

  // Mode tabs
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      testDuration = parseInt(tab.dataset.time);
      resetTest(false);
    });
  });

  // Focus on click anywhere in typing box
  typingBox.addEventListener('click', () => hiddenInput.focus());

  // Global keypress to focus
  document.addEventListener('keydown', (e) => {
    if (overlay.classList.contains('show')) return;
    if (e.key === 'Tab') { e.preventDefault(); resetTest(false); return; }
    if (!testFinished) hiddenInput.focus();
  });

  // ─── Init ─────────────────────────────────────────────────────
  passage = generatePassage(70);
  renderPassage();
  hiddenInput.focus();
</script>
</body>
</html>
